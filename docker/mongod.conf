# docker/mongod.conf
# MongoDB configuration — suppresses verbose WiredTiger checkpoint logs
# Mounted into container at /etc/mongod.conf

storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      # reduce checkpoint verbosity (eliminates DEBUG_1 checkpoint logs)
      journalCompressor: snappy

net:
  port: 27017
  bindIp: 0.0.0.0

systemLog:
  # only log warnings and above — eliminates WiredTiger INFO checkpoint noise
  verbosity: 0
  component:
    storage:
      verbosity: 0
      recovery:
        verbosity: 0
    replication:
      verbosity: 0

operationProfiling:
  slowOpThresholdMs: 100