# monitoring/rules.yml
# Prometheus alerting rules for DermAI
# inhibit_rules MUST be top-level, not inside groups — Prometheus v2.x+ requirement

groups:

  - name: inference_alerts
    rules:

      - alert: HighInferenceLatency_Critical
        expr: histogram_quantile(0.95, rate(inference_latency_seconds_bucket[5m])) > 5.0
        for: 2m
        labels:
          severity: critical
          category: inference
        annotations:
          summary: "Critical: p95 inference latency > 5s"
          description: "p95 latency {{ $value | humanizeDuration }}. CPU may be overloaded."

      - alert: HighInferenceLatency_Warning
        expr: histogram_quantile(0.95, rate(inference_latency_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
          category: inference
        annotations:
          summary: "Warning: p95 inference latency > 2s"
          description: "p95 latency {{ $value | humanizeDuration }}."

      - alert: ModelNotLoaded
        expr: model_loaded == 0
        for: 1m
        labels:
          severity: critical
          category: api
        annotations:
          summary: "Critical: Model not loaded"
          description: "ML model failed to load. API cannot serve predictions."

      - alert: HighErrorRate
        expr: rate(errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          category: api
        annotations:
          summary: "Critical: API error rate > 0.1/s"
          description: "{{ $value | humanize }} errors/s on {{ $labels.endpoint }}."

      - alert: LowPredictionConfidence
        expr: histogram_quantile(0.50, rate(prediction_confidence_bucket[10m])) < 0.4
        for: 10m
        labels:
          severity: warning
          category: inference
        annotations:
          summary: "Warning: Median confidence < 40%"
          description: "Model may be receiving out-of-distribution images."

      - alert: HighRiskPredictionSpike
        expr: rate(high_risk_predictions_total[10m]) > 0.3
        for: 5m
        labels:
          severity: warning
          category: inference
        annotations:
          summary: "Warning: High melanoma prediction rate"
          description: "Melanoma predictions at {{ $value | humanize }}/s."

  - name: memory_alerts
    rules:

      - alert: SystemMemory_Critical
        expr: system_memory_percent > 90
        for: 2m
        labels:
          severity: critical
          category: memory
        annotations:
          summary: "Critical: Memory > 90%"
          description: "Memory at {{ $value }}%. Risk of OOM."

      - alert: SystemMemory_Warning
        expr: system_memory_percent > 78
        for: 5m
        labels:
          severity: warning
          category: memory
        annotations:
          summary: "Warning: Memory > 78%"
          description: "Memory at {{ $value }}%."

  - name: cpu_alerts
    rules:

      - alert: SystemCPU_Critical
        expr: system_cpu_percent > 90
        for: 3m
        labels:
          severity: critical
          category: cpu
        annotations:
          summary: "Critical: CPU > 90%"
          description: "CPU at {{ $value }}% for 3+ minutes."

      - alert: SystemCPU_Warning
        expr: system_cpu_percent > 75
        for: 5m
        labels:
          severity: warning
          category: cpu
        annotations:
          summary: "Warning: CPU > 75%"
          description: "CPU at {{ $value }}%."

  - name: api_alerts
    rules:

      - alert: APIDown
        expr: up{job="fastapi_backend"} == 0
        for: 1m
        labels:
          severity: critical
          category: api
        annotations:
          summary: "Critical: FastAPI backend down"
          description: "Prometheus cannot reach /metrics on backend."

      - alert: HighActiveRequests
        expr: sum(active_requests) > 10
        for: 2m
        labels:
          severity: warning
          category: api
        annotations:
          summary: "Warning: > 10 concurrent requests"
          description: "{{ $value }} concurrent requests active."

      - alert: NegativeFeedbackSpike
        expr: |
          (rate(feedback_total{vote="thumbs_down"}[15m]) /
           (rate(feedback_total{vote="thumbs_up"}[15m]) + 0.001)) > 2
        for: 10m
        labels:
          severity: warning
          category: api
        annotations:
          summary: "Warning: Negative feedback 2x positive rate"
          description: "Users marking predictions as incorrect frequently."

  - name: user_abuse_alerts
    rules:

      - alert: UserRateLimitBreach
        expr: increase(user_rate_limit_breach_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
          category: abuse
        annotations:
          summary: "Warning: User exceeded request limit"
          description: "User {{ $labels.username }} exceeded limit in last hour."

      - alert: UserRateLimitBreach_Repeated
        expr: increase(user_rate_limit_breach_total[1h]) > 3
        for: 5m
        labels:
          severity: critical
          category: abuse
        annotations:
          summary: "Critical: Repeated rate limit breach"
          description: "User {{ $labels.username }} breached {{ $value }} times."

      - alert: RegistrationSpike
        expr: increase(users_registered_total[1h]) > 20
        for: 0m
        labels:
          severity: warning
          category: abuse
        annotations:
          summary: "Warning: > 20 registrations in 1 hour"
          description: "Possible bot signup activity."

  - name: mongodb_alerts
    rules:

      - alert: MongoDBDown
        expr: mongodb_up == 0
        for: 1m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "Critical: MongoDB unreachable"
          description: "Data falling back to in-memory. Data loss risk on restart."

      - alert: MongoDBDown_Sustained
        expr: mongodb_up == 0
        for: 5m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "Critical: MongoDB down 5+ minutes"
          description: "All in-memory data WILL BE LOST on backend restart."