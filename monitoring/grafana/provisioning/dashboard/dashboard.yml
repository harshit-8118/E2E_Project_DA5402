# monitoring/grafana/provisioning/dashboard/dashboard.yml
apiVersion: 1

providers:
  - name: DermAI
    orgId: 1
    folder: DermAI
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false