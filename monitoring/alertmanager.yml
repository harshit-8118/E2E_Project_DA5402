# monitoring/alertmanager.yml
# Alertmanager configuration — Gmail SMTP for alert delivery
# Replace YOUR_GMAIL and YOUR_APP_PASSWORD with real values
# Generate Gmail App Password: myaccount.google.com → Security → App passwords

global:
  smtp_smarthost:     'smtp.gmail.com:587'
  smtp_from:          'YOUR_GMAIL@gmail.com'
  smtp_auth_username: 'YOUR_GMAIL@gmail.com'
  smtp_auth_password: 'YOUR_GMAIL_APP_PASSWORD'   # 16-char app password, not your real password
  smtp_require_tls:   true
  resolve_timeout:    5m

# templates for custom email formatting
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# routing tree
route:
  group_by:         ['alertname', 'category']
  group_wait:       30s      # wait before sending first alert in group
  group_interval:   5m       # wait before sending new alerts for existing group
  repeat_interval:  1h       # re-notify if alert still firing after 1h
  receiver:         'default'

  routes:
    # critical alerts — immediate delivery
    - match:
        severity: critical
      receiver: critical_alerts
      group_wait: 10s
      repeat_interval: 30m

    # warning alerts — batched delivery
    - match:
        severity: warning
      receiver: warning_alerts
      group_wait: 60s
      repeat_interval: 2h

    # database alerts — separate channel
    - match:
        category: database
      receiver: database_alerts
      group_wait: 15s
      repeat_interval: 30m

# receivers
receivers:

  - name: 'default'
    email_configs:
      - to: 'YOUR_GMAIL@gmail.com'
        send_resolved: true
        headers:
          Subject: '[DermAI] {{ .GroupLabels.alertname }} — {{ .Status | toUpper }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Details: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Category: {{ .Labels.category }}
          Started: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}

  - name: 'critical_alerts'
    email_configs:
      - to: 'YOUR_GMAIL@gmail.com'
        send_resolved: true
        headers:
          Subject: '🔴 [CRITICAL] DermAI — {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color:#dc2626">🔴 CRITICAL ALERT</h2>
          {{ range .Alerts }}
          <table style="border-collapse:collapse;width:100%">
            <tr><td style="padding:8px;font-weight:bold">Alert</td><td style="padding:8px">{{ .Annotations.summary }}</td></tr>
            <tr><td style="padding:8px;font-weight:bold">Details</td><td style="padding:8px">{{ .Annotations.description }}</td></tr>
            <tr><td style="padding:8px;font-weight:bold">Severity</td><td style="padding:8px;color:#dc2626">{{ .Labels.severity | toUpper }}</td></tr>
            <tr><td style="padding:8px;font-weight:bold">Category</td><td style="padding:8px">{{ .Labels.category }}</td></tr>
            <tr><td style="padding:8px;font-weight:bold">Started</td><td style="padding:8px">{{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</td></tr>
          </table>
          <hr/>
          {{ end }}
          <p style="color:#6b7280;font-size:12px">DermAI — DA5402 MLOps Project, IIT Madras</p>

  - name: 'warning_alerts'
    email_configs:
      - to: 'YOUR_GMAIL@gmail.com'
        send_resolved: true
        headers:
          Subject: '🟡 [WARNING] DermAI — {{ .GroupLabels.alertname }}'
        body: |
          ⚠️ WARNING ALERT

          {{ range .Alerts }}
          Alert    : {{ .Annotations.summary }}
          Details  : {{ .Annotations.description }}
          Category : {{ .Labels.category }}
          Started  : {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}

  - name: 'database_alerts'
    email_configs:
      - to: 'YOUR_GMAIL@gmail.com'
        send_resolved: true
        headers:
          Subject: '🗄️ [DATABASE] DermAI MongoDB Alert — {{ .Status | toUpper }}'
        body: |
          DATABASE ALERT

          {{ range .Alerts }}
          Alert    : {{ .Annotations.summary }}
          Details  : {{ .Annotations.description }}
          Status   : {{ .Status | toUpper }}
          Started  : {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}

          Note: When MongoDB is down, feedback data is stored in memory only.
          Restart risk: in-memory data will be lost.

# inhibition rules — suppress warning if critical already firing
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'category']