# monitoring/prometheus.yml
# All targets use Docker service names — works inside dermai_net network
# node-exporter listens on 9182 (matches compose command)

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    project:     'dermai'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 5s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:

  - job_name: 'fastapi_backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout:  8s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9182']
    scrape_interval: 15s

  - job_name: 'mongodb_exporter'
    static_configs:
      - targets: ['mongodb-exporter:9216']
    scrape_interval: 15s

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    scrape_interval: 15s