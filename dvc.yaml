stages:
  prepare:
    cmd: python -m src.data_proc.prepare
    deps:
      - src/data_proc/prepare.py
      - data/raw/HAM10000_metadata.csv
      - data/raw/images/part_1
      - data/raw/images/part_2
      - data/raw/test_images
      - data/raw/ISIC2018_Task3_Test_GroundTruth.csv
    params:
      - prepare
    outs:
      - data/processed/train.csv
      - data/processed/val.csv
      - data/processed/test.csv
    metrics:
      - data/reports/prepare_summary.json:
          cache: false
      - data/reports/baseline_stats.json:
          cache: false

  train:
    cmd: python -m src.models.train
    deps:
      - src/models/train.py
      - src/models/model.py
      - src/utils/mlflow_utils.py
      - src/utils/metrics.py
      - src/utils/reproducibility.py  
      - src/utils/logger.py
      - data/processed/train.csv
      - data/processed/val.csv
      - data/reports/baseline_stats.json
    params:
      - train
      - prepare
    outs:
      - outputs/models/best_model.pth
    metrics:
      - outputs/metrics/train_history.json:
          cache: false
      - outputs/metrics/mlflow_run_id.txt:
          cache: false

  evaluate:
    cmd: python -m src.models.inference
    deps:
      - src/models/inference.py
      - src/models/model.py                
      - src/models/train.py                
      - src/utils/mlflow_utils.py          
      - src/utils/metrics.py               
      - src/utils/reproducibility.py       
      - src/utils/logger.py                
      - outputs/models/best_model.pth
      - outputs/metrics/mlflow_run_id.txt  
      - data/processed/test.csv
    params:
      - train
      - evaluate
    metrics:
      - outputs/metrics/eval_metrics.json:
          cache: false
    plots:
      - outputs/plots/confusion_matrix.png
    outs:
      - outputs/plots/gradcam:       
          cache: false
