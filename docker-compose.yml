# docker-compose.yml
# DermAI Complete Stack — CPU only
#
# Usage:
#   docker compose --env-file .env up -d
#   docker compose --env-file .env up -d backend  (single service)
#   docker compose logs backend -f
#   docker compose down          (keep volumes)
#   docker compose down -v       (delete volumes too — clears ALL data)
#
# After start:
#   Frontend     → http://localhost:7500
#   API docs     → http://localhost:8000/docs
#   Grafana      → http://localhost:3005  (admin / admin)
#   Prometheus   → http://localhost:9090
#   Alertmanager → http://localhost:9093
#   Airflow      → http://localhost:8080  (admin / admin)

networks:
  dermai_net:
    driver: bridge

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:
  mongodb_backup:
  airflow_logs:       # Airflow task logs
  airflow_pg:         # PostgreSQL data for Airflow (if switching from SQLite)

# shared Airflow config (DRY — referenced by all three Airflow services) 
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2-python3.10
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR:             LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY:           ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__CORE__LOAD_EXAMPLES:        "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG:   "true"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER:   /opt/airflow/logs
    AIRFLOW_PROJECT_ROOT:                /opt/airflow/project
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - ./:/opt/airflow/project:ro
    - ./data/reports:/opt/airflow/project/data/reports
  networks:
    - dermai_net

services:

  # MongoDB 6.0
  mongodb:
    image: mongo:6.0.14
    container_name: dermai-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-skin_disease_detection}
    command: >
      mongod
      --setParameter diagnosticDataCollectionEnabled=false
      --quiet
    networks:
      - dermai_net
    healthcheck:
      test: >
        mongosh --quiet --eval
        "try { db.adminCommand('ping').ok } catch(e) { 0 }"
        mongodb://localhost:27017/admin
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: dermai-backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI:  "mongodb://mongodb:27017"
      MONGO_DB:   "${MONGO_DB:-skin_disease_detection}"
      DEVICE:     "${DEVICE:-cpu}"
      API_PORT:   "8000"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./outputs:/app/outputs:ro
      - ./logs:/app/logs
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --log-level info
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - dermai_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r = urllib.request.urlopen('http://localhost:8000/health', timeout=10); assert r.status == 200"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: dermai-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      PUBLIC_API_URL: "${PUBLIC_API_URL:-http://localhost:8000}"
      USER_MANUAL_URL: "${USER_MANUAL_URL:-}"
    ports:
      - "${FRONTEND_PORT:-7500}:7500"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dermai_net

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: dermai-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=0.0.0.0:9093
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - dermai_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Node Exporter
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: dermai-node-exporter
    restart: unless-stopped
    command:
      - --web.listen-address=0.0.0.0:9182
    ports:
      - "${NODE_EXPORTER:-9182}:9182"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - dermai_net

  # MongoDB Exporter
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: dermai-mongodb-exporter
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://mongodb:27017
      - --web.listen-address=0.0.0.0:9216
      - --collect-all
    ports:
      - "9216:9216"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - dermai_net

  # Prometheus v2.51.2 
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: dermai-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.listen-address=0.0.0.0:9090
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - alertmanager
      - node-exporter
      - mongodb-exporter
    networks:
      - dermai_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Grafana 10.4.3 LTS 
  grafana:
    image: grafana/grafana:10.4.3
    container_name: dermai-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:                  admin
      GF_SECURITY_ADMIN_PASSWORD:              admin
      GF_SERVER_HTTP_PORT:                     3000
      GF_USERS_ALLOW_SIGN_UP:                  "false"
      GF_AUTH_TOKEN_ROTATION_INTERVAL_MINUTES: "0"
      GF_LOG_LEVEL:                            warn
    ports:
      - "${GRAFANA_PORT:-3005}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana_dashboard.json:/var/lib/grafana/dashboards/dermai-dashboard.json:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - dermai_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Airflow Init
  airflow-init:
    <<: *airflow-common
    container_name: dermai-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs &&
        airflow db migrate &&
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@dermai.local || true &&
        echo "=== Airflow init complete ==="
    restart: "no"
    depends_on:
      airflow-postgres:
        condition: service_healthy
  
  airflow-postgres:
    image: postgres:15
    container_name: dermai-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg:/var/lib/postgresql/data
    networks:
      - dermai_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Airflow Webserver
  # FIX 3: No depends_on airflow-init — webserver has restart:unless-stopped
  # so it retries on its own if the DB isn't ready yet (self-healing)
  airflow-webserver:
    <<: *airflow-common
    container_name: dermai-airflow-web
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-postgres:
        condition: service_healthy

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: dermai-airflow-scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
        